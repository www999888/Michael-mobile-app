workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      gradle: 8.5
      xcode: 15.0
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.ipa
    scripts:
      - flutter pub get
      - flutter build apk --release
    working_dir: .
