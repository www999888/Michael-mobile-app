# Codemagic Configuration
# AI Stock Monitor CI/CD Pipeline

workflows:
  ai-stock-monitor-ci:
    name: CI Build & Test
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      python: 3.11

    scripts:
      - python --version
      - pip install -r requirements.txt
      - python main.py demo

  ai-stock-monitor-pypi:
    name: PyPI Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      python: 3.11

    scripts:
      - pip install twine
      - twine upload dist/*
