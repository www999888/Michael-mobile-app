# Codemagic CI/CD 配置
# AI Stock Monitor 项目构建和分发
# https://codemagic.io

workflows:
  # === 工作流 1: 主要构建和测试 ===
  ai-stock-monitor-ci:
    name: AI Stock Monitor - CI Build & Test
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      python: 3.11
      env:
        - PYTHONIOENCODING: UTF-8
        - PYTHONUTF8: 1
    
    triggering:
      events:
        - push
        - tag
        - pull_request
      branch_patterns:
        - pattern: master
          include: true
        - pattern: develop
          include: true
        - pattern: feature/*
          include: true
    
    scripts:
      - name: Python 环境检查
        script: |
          echo "======================================"
          echo "Python 环境检测"
          echo "======================================"
          echo "Python 版本：$PYTHON_VERSION"
          python --version
          pip --version
      
      - name: 创建虚拟环境
        script: |
          echo "创建虚拟环境..."
          python -m venv venv
          source venv/bin/activate
      
      - name: 安装项目依赖
        script: |
          echo "安装项目依赖..."
          source venv/bin/activate
          
          # 升级 pip
          python -m pip install --upgrade pip
          
          # 安装核心依赖
          pip install -r requirements.txt
          
          # 安装开发工具
          pip install pytest pytest-cov black flake8 mypy
      
      - name: 运行完整测试
        script: |
          echo "======================================"
          echo "运行测试套件"
          echo "======================================"
          source venv/bin/activate
          
          # 运行测试脚本
          python test_all.py
          
          # 运行 pytest (如果有 tests 目录)
          # pytest tests/ -v --cov=ai_stock_monitor --cov-report=xml
      
      - name: 代码质量检查
        script: |
          echo "======================================"
          echo "代码质量检查"
          echo "======================================"
          source venv/bin/activate
          
          # Black 代码格式化检查
          black --check . || echo "Black check completed (may have issues)"
          
          # Flake8 代码风格检查
          flake8 . --max-line-length=120 --ignore=E501,W503,W504 --exclude=venv,build,dist
      
      - name: 项目结构验证
        script: |
          echo "======================================"
          echo "项目结构验证"
          echo "======================================"
          
          # 检查关键文件是否存在
          if [ -f "main.py" ]; then
            echo "✅ main.py 存在"
          else
            echo "❌ main.py 不存在"
            exit 1
          fi
          
          if [ -f "requirements.txt" ]; then
            echo "✅ requirements.txt 存在"
          else
            echo "❌ requirements.txt 不存在"
            exit 1
          fi
          
          if [ -f "config/settings.py" ]; then
            echo "✅ config/settings.py 存在"
          else
            echo "❌ config/settings.py 不存在"
            exit 1
          fi
          
          if [ -f "analyzer/tech_analyzer.py" ]; then
            echo "✅ analyzer/tech_analyzer.py 存在"
          else
            echo "❌ analyzer/tech_analyzer.py 不存在"
            exit 1
          fi
          
          echo "✅ 项目结构验证通过"
    
    artifacts:
      - build/**
      - **/build/**/*.jar
      - **/build/**/*.apk
      - **/build/**/*.ipa
      - .codemagic/test_results/**
      - coverage.xml
      - .codemagic/code_coverage_report.html
    
    publishing:
      email:
        recipients:
          - admin@example.com
          - devops@example.com
        notifications:
          - start
          - success
          - failure
          - always
      
      slack:
        notifications:
          - start
          - success
          - failure
          - always
        channel: "#ai-stock-monitor-builds"

  # === 工作流 2: PyPI 发布 ===
  ai-stock-monitor-pypi:
    name: AI Stock Monitor - PyPI Release
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      python: 3.11
      env:
        - PYTHONIOENCODING: UTF-8
        - PYPI_USERNAME: $PYPI_USERNAME
        - PYPI_PASSWORD: $PYPI_PASSWORD
    
    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: release/*
          include: true
    
    scripts:
      - name: 版本检测
        script: |
          echo "======================================"
          echo "版本检测"
          echo "======================================"
          
          # 获取 Git 标签
          export VERSION=$(echo $CM_TAG_NAME | sed 's/v//')
          echo "发布版本：$VERSION"
          echo "Git 标签：$CM_TAG_NAME"
          echo "触发事件：$CM_BUILD_REASON"
      
      - name: 准备发布环境
        script: |
          echo "准备发布环境..."
          source venv/bin/activate
          
          # 安装打包工具
          pip install setuptools wheel twine build bump2version
      
      - name: 更新版本信息
        script: |
          echo "更新版本信息..."
          source venv/bin/activate
          
          export VERSION=$(echo $CM_TAG_NAME | sed 's/v//')
          
          # 更新 __version__ 在 __init__.py
          sed -i '' "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" analyzer/__init__.py
          
          # 更新 __version__ 在 main.py
          sed -i '' "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" main.py
          
          echo "版本号已更新为：$VERSION"
      
      - name: 构建 Python 包
        script: |
          echo "======================================"
          echo "构建 Python 包"
          echo "======================================"
          source venv/bin/activate
          
          # 清理旧构建
          rm -rf build/ dist/ *.egg-info
          
          # 构建 wheel 和 source distribution
          python -m build
          
          # 验证构建结果
          ls -la dist/
          
          # 检查构建包
          twine check dist/*
      
      - name: 上传到 TestPyPI (测试发布)
        script: |
          echo "======================================"
          echo "上传到 TestPyPI"
          echo "======================================"
          source venv/bin/activate
          
          # 使用 API Token 上传
          twine upload --repository testpypi dist/*
          
          echo "TestPyPI 发布完成！"
      
      - name: 上传到 PyPI (生产发布)
        script: |
          echo "======================================"
          echo "上传到 PyPI"
          echo "======================================"
          source venv/bin/activate
          
          # 验证是否有生产环境 token
          if [ -z "$PYPI_PASSWORD" ]; then
            echo "⚠️  生产环境 token 未配置，跳过生产发布"
            exit 0
          fi
          
          # 上传到 PyPI
          twine upload dist/*
          
          echo "PyPI 发布完成！"
          echo "发布链接：https://pypi.org/project/ai-stock-monitor/$CM_TAG_NAME/"
    
    artifacts:
      - dist/*.whl
      - dist/*.tar.gz
      - .codemagic/build_log.txt
      - .codemagic/upload_log.txt
      - .codemagic/verify_log.txt
    
    publishing:
      email:
        recipients:
          - admin@example.com
          - releases@example.com
          - devops@example.com
        notifications:
          - start
          - success
          - failure
          - always
      
      slack:
        notifications:
          - start
          - success
          - failure
          - always
        channel: "#ai-stock-monitor-releases"
      
      app_store:
        notifications:
          - success
          - failure

  # === 工作流 3: Docker 镜像构建 ===
  ai-stock-monitor-docker:
    name: AI Stock Monitor - Docker Build & Push
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      python: 3.11
      docker:
        version: latest
      env:
        - PYTHONIOENCODING: UTF-8
        - DOCKER_REGISTRY: codemagic.io/${CM_WORKFLOW}/docker
        - DOCKER_USERNAME: $DOCKER_USERNAME
        - DOCKER_PASSWORD: $DOCKER_PASSWORD
        - DOCKER_EMAIL: $DOCKER_EMAIL
    
    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: release/*
          include: true
          exclude: false
    
    scripts:
      - name: Docker 环境检测
        script: |
          echo "======================================"
          echo "Docker 环境检测"
          echo "======================================"
          docker --version
          docker compose version
          docker images
      
      - name: Docker 登录
        script: |
          echo "======================================"
          echo "Docker 登录"
          echo "======================================"
          
          # 登录 Docker Hub
          echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
          
          echo "Docker 登录成功！"
      
      - name: 构建 Docker 镜像
        script: |
          echo "======================================"
          echo "构建 Docker 镜像"
          echo "======================================"
          
          # 获取 Git 标签作为版本号
          export VERSION=$(echo $CM_TAG_NAME | sed 's/v//')
          export GIT_COMMIT=$CM_COMMIT_SHA
          export BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          echo "构建参数:"
          echo "  版本：$VERSION"
          echo "  Commit: $GIT_COMMIT"
          echo "  构建时间：$BUILD_DATE"
          
          # 构建生产镜像
          docker build \
            --build-arg VERSION=$VERSION \
            --build-arg BUILD_DATE=$BUILD_DATE \
            --build-arg GIT_COMMIT=$GIT_COMMIT \
            -t ai-stock-monitor:$VERSION \
            -t ai-stock-monitor:latest \
            -t codemagic.io/${CM_WORKFLOW}/docker/ai-stock-monitor:$VERSION \
            -f Dockerfile .
          
          # 查看构建镜像
          docker images | grep ai-stock-monitor
      
      - name: 推送 Docker 镜像
        script: |
          echo "======================================"
          echo "推送 Docker 镜像"
          echo "======================================"
          
          # 推送到 Docker Hub
          docker push ai-stock-monitor:$VERSION
          docker push ai-stock-monitor:latest
          
          # 推送到 Codemagic Registry
          docker push codemagic.io/${CM_WORKFLOW}/docker/ai-stock-monitor:$VERSION
          
          echo "镜像推送完成！"
          echo "Docker Hub: docker.io/ai-stock-monitor:$VERSION"
          echo "Registry: codemagic.io/${CM_WORKFLOW}/docker/ai-stock-monitor:$VERSION"
      
      - name: 生成 Docker Compose 文件
        script: |
          echo "======================================"
          echo "生成 Docker Compose 文件"
          echo "======================================"
          
          export VERSION=$(echo $CM_TAG_NAME | sed 's/v//')
          
          cat > docker-compose.prod.yml <<EOF
# AI Stock Monitor - 生产环境 Docker Compose
# 自动生成，不要手动修改

version: '3.8'

services:
  ai-stock-monitor:
    image: ai-stock-monitor:${VERSION}
    container_name: ai-stock-monitor
    ports:
      - "8501:8501"
    environment:
      - PYTHONIOENCODING=utf-8
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - TUSHARE_TOKEN=\${TUSHARE_TOKEN}
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
      - ./data_storage:/app/data_storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "main.py", "demo"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ai-stock-monitor-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - ai-stock-monitor-network

networks:
  ai-stock-monitor-network:
    driver: bridge

volumes:
  ollama_data:

EOF
          
          echo "✅ docker-compose.prod.yml 生成完成！"
          cat docker-compose.prod.yml
          
          # 生成开发环境配置
          cat > docker-compose.dev.yml <<EOF
# AI Stock Monitor - 开发环境 Docker Compose
# 用于本地开发和测试

version: '3.8'

services:
  ai-stock-monitor-dev:
    build: .
    container_name: ai-stock-monitor-dev
    ports:
      - "8501:8501"
    environment:
      - PYTHONIOENCODING=utf-8
      - STREAMLIT_SERVER_HEADLESS=false
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ./data_storage:/app/data_storage
    command: python main.py web
    restart: unless-stopped

EOF
          
          echo "✅ docker-compose.dev.yml 生成完成！"
    
    artifacts:
      - docker-compose.prod.yml
      - docker-compose.dev.yml
      - .codemagic/docker_logs/**
      - .codemagic/image_build_log.txt
    
    publishing:
      email:
        recipients:
          - ops@example.com
          - devops@example.com
        notifications:
          - start
          - success
          - failure
          - always
      slack:
        notifications:
          - start
          - success
          - failure
          - always
        channel: "#ai-stock-monitor-docker"

  # === 工作流 4: GitHub 发布 ===
  ai-stock-monitor-github-release:
    name: AI Stock Monitor - GitHub Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      python: 3.11
      env:
        - PYTHONIOENCODING: UTF-8
        - GITHUB_TOKEN: $GITHUB_TOKEN
    
    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: release/*
          include: true
    
    scripts:
      - name: GitHub 环境检查
        script: |
          echo "======================================"
          echo "GitHub 环境检查"
          echo "======================================"
          echo "Git 标签：$CM_TAG_NAME"
          echo "触发事件：$CM_BUILD_REASON"
      
      - name: 准备发布资产
        script: |
          echo "======================================"
          echo "准备发布资产"
          echo "======================================"
          
          export VERSION=$(echo $CM_TAG_NAME | sed 's/v//')
          
          # 生成 CHANGELOG.md
          cat > CHANGELOG.md <<EOF
# Changelog
所有重要更改都将记录在此文件中。

## [${VERSION}] - ${CM_BUILD_DATE}
### 添加
- 

### 修改
- 

### 修复
- 

### 安全
- 

EOF
          echo "✅ CHANGELOG.md 生成完成"
      
      - name: 创建 GitHub Release
        script: |
          echo "======================================"
          echo "创建 GitHub Release"
          echo "======================================"
          
          export VERSION=$(echo $CM_TAG_NAME | sed 's/v//')
          
          # 使用 GitHub CLI 创建 release
          gh release create "$VERSION" \
            --title "AI Stock Monitor v$VERSION" \
            --notes-file CHANGELOG.md \
            --repo github.com/www999888/Michael-mobile-app
          
          echo "✅ GitHub Release 创建完成！"
      
      - name: 上传 Release 资产
        script: |
          echo "======================================"
          echo "上传 Release 资产"
          echo "======================================"
          
          export VERSION=$(echo $CM_TAG_NAME | sed 's/v//')
          
          # 压缩文档
          zip -r "ai-stock-monitor-docs-v$VERSION.zip" README.md README_DETAILED.md QUICKSTART.md PROJECT_SUMMARY.md PROJECT_DELIVERY.md VERIFICATION_REPORT.md
          
          # 压缩源代码
          zip -r "ai-stock-monitor-src-v$VERSION.zip" config data analyzer monitor trader ui main.py requirements.txt Dockerfile docker-compose.yml run.sh run.bat
          
          # 上传资产
          gh release upload "$VERSION" "ai-stock-monitor-docs-v$VERSION.zip"
          gh release upload "$VERSION" "ai-stock-monitor-src-v$VERSION.zip"
          
          echo "✅ Release 资产上传完成！"
    
    publishing:
      email:
        recipients:
          - admin@example.com
        notifications:
          - success
          - failure
      slack:
        notifications:
          - success
          - failure
        channel: "#ai-stock-monitor-github"

# === 全局定义 ===
definitions:
  # 通用环境变量
  common_env:
    - PYTHONIOENCODING: UTF-8
    - LC_ALL: en_US.UTF-8
    - PYTHONUTF8: 1
  
  # 通用脚本
  common_scripts:
    - echo "======================================"
    - echo "Codemagic 环境检测完成"
    - echo "======================================"
    - echo "Python 版本：$PYTHON_VERSION"
    - echo "Git 标签：$CM_TAG_NAME"
    - echo "触发事件：$CM_BUILD_REASON"
    - echo "工作流：$CM_WORKFLOW"

# === 工作流参数 ===
parameters:
  - name: deploy_environment
    default: production
    description: 部署环境 (production/staging)
  - name: notify_slack
    default: true
    description: 是否通知 Slack
  - name: docker_push
    default: true
    description: 是否推送 Docker 镜像
